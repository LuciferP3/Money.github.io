<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LKR මුදල් හඳුනාගනිමු</title>
  <style>
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f8ff;
      margin: 0;
      padding: clamp(6px, 2vh, 15px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      touch-action: manipulation; /* Prevents accidental double-tap zooming */
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      box-sizing: border-box;
    }

    h1 {
      color: #333;
      margin: 0;
      font-size: clamp(1rem, 4.5vh, 1.8rem);
      text-align: center;
    }

    p.instructions {
      color: #666;
      font-size: clamp(0.65rem, 2vh, 1rem);
      margin: 2px 0 0;
      text-align: center;
    }

    /* Shop Area */
    .shop-container {
      display: flex;
      gap: clamp(4px, 1.5vw, 15px);
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1000px;
    }

    .item-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: clamp(4px, 1.2vh, 15px) clamp(4px, 1vw, 15px);
      width: clamp(80px, 17vw, 140px);
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: transform 0.2s, background-color 0.2s;
      box-sizing: border-box;
    }

    .item-emoji {
      font-size: clamp(1.4rem, 5vh, 3rem);
      margin: 2px 0;
    }

    .item-name {
      font-weight: bold;
      font-size: clamp(0.65rem, 2vh, 1.1rem);
      color: #444;
      white-space: nowrap;
    }

    .price-tag {
      display: inline-block;
      background-color: #ff4757;
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: bold;
      margin: 4px 0;
      font-size: clamp(0.6rem, 1.8vh, 0.9rem);
    }

    .drop-zone {
      border: 2px dashed #3742fa;
      background-color: #f1f2f6;
      border-radius: 8px;
      padding: clamp(4px, 1vh, 12px) 5px;
      min-height: clamp(20px, 4vh, 40px);
      font-size: clamp(0.55rem, 1.6vh, 0.85rem);
      color: #57606f;
      margin-top: clamp(4px, 1vh, 10px);
      pointer-events: none; /* Crucial for mobile elementFromPoint detection */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Highlight effect when item is hovered over on drag */
    .item-card.hovered {
      background-color: #dfe4ea;
      border-color: #2ed573;
    }

    /* Wallet / Selection Box */
    .wallet-container {
      background: #f8f9fa;
      border: 3px solid #2ed573;
      border-radius: 15px;
      padding: clamp(6px, 1.5vh, 20px);
      width: 100%;
      max-width: 900px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      text-align: center;
      box-sizing: border-box;
    }

    .wallet-title {
      font-size: clamp(0.85rem, 2.5vh, 1.3rem);
      color: #2ed573;
      margin-top: 0;
      margin-bottom: clamp(4px, 1vh, 15px);
      font-weight: bold;
    }

    .coins-pool {
      display: flex;
      gap: clamp(6px, 1.5vw, 15px);
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Currency Styling */
    .money-element {
      cursor: grab;
      user-select: none;
      box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
      touch-action: none; /* Prevents the viewport from scrolling while dragging money */
      position: relative;
      z-index: 10;
    }

    .money-element:active {
      cursor: grabbing;
    }

    .img-note {
      height: clamp(36px, 8vh, 65px);
      border-radius: 4px;
      display: block;
    }

    .img-coin {
      border-radius: 50%;
      display: block;
    }

    .coin-10 img { width: clamp(32px, 7vh, 55px); height: clamp(32px, 7vh, 55px); }
    .coin-5 img { width: clamp(28px, 6vh, 48px); height: clamp(28px, 6vh, 48px); }

    /* Status Text */
    #feedback {
      margin: 0;
      font-size: clamp(0.7rem, 2.2vh, 1.1rem);
      font-weight: bold;
      min-height: clamp(16px, 3vh, 30px);
      text-align: center;
    }
    .success { color: #2ed573; }
    .error { color: #ff4757; }
    .info { color: #3742fa; }

    /* Landscape phones: side-by-side layout to avoid vertical overflow */
    @media (max-height: 500px) and (orientation: landscape) {
      body {
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: space-evenly;
        align-items: center;
        gap: 6px;
      }

      .header-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 0 0 auto;
        max-width: 16vw;
      }

      h1 { font-size: clamp(0.75rem, 3.2vh, 1.1rem); }
      p.instructions { display: none; }

      .shop-container {
        flex: 1 1 auto;
        max-width: 55vw;
        gap: 4px;
      }

      .item-card { width: clamp(58px, 10vw, 95px); }

      .wallet-container {
        flex: 0 0 auto;
        max-width: 22vw;
        padding: 4px 6px;
      }

      .coins-pool { gap: 4px; }

      #feedback {
        position: fixed;
        bottom: 2px;
        left: 0;
        right: 0;
        font-size: 0.6rem;
        min-height: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="header-group">
    <h1>හිතමිතුරු වෙළඳසැල 🛍️</h1>
    <p class="instructions">ඔබේ පසුම්බියෙන් සල්ලි හෝ කාසි භාණ්ඩ මතට ඇදගෙන ගොස් දමන්න!</p>
  </div>

  <div class="shop-container">
    <div class="item-card" data-price="15">
      <div class="item-emoji">✏️</div>
      <div class="item-name">පැන්සල</div>
      <div class="price-tag">රු 15</div>
      <div class="drop-zone" data-current-total="0">මෙතනට දමන්න</div>
    </div>

    <div class="item-card" data-price="35">
      <div class="item-emoji">🍎</div>
      <div class="item-name">ඇපල් ගෙඩිය</div>
      <div class="price-tag">රු 35</div>
      <div class="drop-zone" data-current-total="0">මෙතනට දමන්න</div>
    </div>

    <div class="item-card" data-price="70">
      <div class="item-emoji">🍦</div>
      <div class="item-name">අයිස්ක්‍රීම්</div>
      <div class="price-tag">රු 70</div>
      <div class="drop-zone" data-current-total="0">මෙතනට දමන්න</div>
    </div>

    <div class="item-card" data-price="120">
      <div class="item-emoji">🧸</div>
      <div class="item-name">ටෙඩී බෙයාර්</div>
      <div class="price-tag">රු 120</div>
      <div class="drop-zone" data-current-total="0">මෙතනට දමන්න</div>
    </div>

    <div class="item-card" data-price="150">
      <div class="item-emoji">🎨</div>
      <div class="item-name">පාට පෙට්ටිය</div>
      <div class="price-tag">රු 150</div>
      <div class="drop-zone" data-current-total="0">මෙතනට දමන්න</div>
    </div>
  </div>

  <div class="wallet-container">
    <div class="wallet-title">පසුම්බිය 💰</div>
    <div class="coins-pool">
      
      <div class="money-element" draggable="true" data-value="100">
        <img class="img-note" src="100.jpg" alt="රු 100">
      </div>
      
      <div class="money-element" draggable="true" data-value="50">
        <img class="img-note" src="50.jpg" alt="රු 50">
      </div>
      
      <div class="money-element" draggable="true" data-value="20">
        <img class="img-note" src="20.jpg" alt="රු 20">
      </div>
      
      <div class="money-element coin-10" draggable="true" data-value="10">
        <img class="img-coin" src="10.png" alt="රු 10">
      </div>
      
      <div class="money-element coin-5" draggable="true" data-value="5">
        <img class="img-coin" src="5.png" alt="රු 5">
      </div>

    </div>
  </div>

  <div id="feedback"></div>

  <script>
    const moneyElements = document.querySelectorAll('.money-element');
    const itemCards = document.querySelectorAll('.item-card');
    const feedback = document.getElementById('feedback');

    let draggedValue = 0;
    let targetCardMobile = null;

    // --- 1. DESKTOP DRAG & DROP EVENTS ---
    moneyElements.forEach(money => {
      money.addEventListener('dragstart', (e) => {
        draggedValue = parseInt(e.currentTarget.dataset.value);
      });
    });

    itemCards.forEach(card => {
      card.addEventListener('dragover', (e) => {
        e.preventDefault(); 
        card.classList.add('hovered');
      });

      card.addEventListener('dragleave', () => {
        card.classList.remove('hovered');
      });

      card.addEventListener('drop', (e) => {
        e.preventDefault();
        card.classList.remove('hovered');
        calculateTotal(card, draggedValue);
      });
    });


    // --- 2. MOBILE SMARTPHONE TOUCH EVENTS ---
    moneyElements.forEach(money => {
      let startX = 0;
      let startY = 0;

      money.addEventListener('touchstart', (e) => {
        draggedValue = parseInt(e.currentTarget.dataset.value);
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        money.style.transition = 'none'; // Instant movement response
      }, { passive: true });

      money.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const moveX = touch.clientX - startX;
        const moveY = touch.clientY - startY;

        // Visual translation of note/coin tracking the finger position
        money.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;

        // Identify the element directly under the user's touch target area
        const elementUnderFinger = document.elementFromPoint(touch.clientX, touch.clientY);
        const cardFound = elementUnderFinger ? elementUnderFinger.closest('.item-card') : null;

        // Manage active mobile styling
        itemCards.forEach(c => c.classList.remove('hovered'));
        if (cardFound && !cardFound.style.opacity) {
          cardFound.classList.add('hovered');
          targetCardMobile = cardFound;
        } else {
          targetCardMobile = null;
        }
      }, { passive: true });

      money.addEventListener('touchend', (e) => {
        // Reset element position cleanly back into wallet
        money.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        money.style.transform = 'none';

        if (targetCardMobile) {
          targetCardMobile.classList.remove('hovered');
          calculateTotal(targetCardMobile, draggedValue);
          targetCardMobile = null;
        }
      });
    });


    // --- 3. UNIFIED PAYMENT LOGIC ---
    function calculateTotal(card, amountPaid) {
      const zone = card.querySelector('.drop-zone');
      const itemPrice = parseInt(card.dataset.price);
      let currentTotal = parseInt(zone.dataset.currentTotal);

      currentTotal += amountPaid;
      zone.dataset.currentTotal = currentTotal;

      if (currentTotal === itemPrice) {
        showFeedback(`🎉 හරි! ඔබ ${card.querySelector('.item-name').innerText} මිලදී ගත්තා!`, 'success');
        card.style.opacity = '0.4';
        zone.innerText = "මිලදී ගත්තා ✅";
        card.style.pointerEvents = 'none'; 
      } 
      else if (currentTotal > itemPrice) {
        showFeedback(`⚠️ අපොයි! මුදල් වැඩියි (රු ${currentTotal}). හරියට ගාණ බලන්න.`, 'error');
        zone.dataset.currentTotal = 0;
        zone.innerText = "මෙතනට දමන්න";
      } 
      else {
        showFeedback(`👍 රු ${amountPaid}ක් එකතු කළා. දැනට එකතුව: රු ${currentTotal} / ${itemPrice}. තව දමන්න!`, 'info');
        zone.innerText = `ගෙවා ඇත: රු ${currentTotal}`;
      }
    }

    function showFeedback(message, className) {
      feedback.innerText = message;
      feedback.className = className;
    }
  </script>
</body>
</html>
